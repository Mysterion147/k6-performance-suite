name: K6 Performance Suite CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  performance-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 suite
        run: k6 run complete-suite/performance-suite.js

      - name: Upload Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: k6-report
          path: complete-suite-report.html

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_files: complete-suite-report.html
          destination_dir: reports